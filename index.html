<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Server Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Minecraft Server</h1>
            <p>Panel by @Prostynskiy</p>
        </header>
        
        <div class="status-card" id="status-card">
            <div class="status-header">
                <span class="status-indicator online" id="status-indicator"></span>
                <span id="status-text">Server Online</span>
            </div>
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-icon">👥</span>
                    <span class="stat-value" id="players-count">0/100</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🕒</span>
                    <span class="stat-value" id="uptime">0h 0m</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💾</span>
                    <span class="stat-value" id="memory">0 MB</span>
                </div>
            </div>
        </div>
        
        <div class="control-grid">
            <button class="btn btn-primary" onclick="action('start')">
                <span class="btn-icon">▶️</span>
                <span>Start</span>
            </button>
            <button class="btn btn-warning" onclick="action('restart')">
                <span class="btn-icon">🔄</span>
                <span>Restart</span>
            </button>
            <button class="btn btn-danger" onclick="action('stop')">
                <span class="btn-icon">⏹️</span>
                <span>Stop</span>
            </button>
            <button class="btn btn-info" onclick="action('save')">
                <span class="btn-icon">💾</span>
                <span>Save</span>
            </button>
            <button class="btn btn-success" onclick="action('backup')">
                <span class="btn-icon">📦</span>
                <span>Backup</span>
            </button>
            <button class="btn btn-secondary" onclick="openConsole()">
                <span class="btn-icon">💬</span>
                <span>Console</span>
            </button>
        </div>
        
        <div class="section">
            <h3>👥 Players Online</h3>
            <div id="players-list" class="players-list">
                <p class="empty-message">No players online</p>
            </div>
        </div>
        
        <div class="section">
            <h3>📊 Server Statistics</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">CPU</span>
                    <span class="stat-value" id="cpu-usage">0%</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="cpu-bar"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">RAM</span>
                    <span class="stat-value" id="ram-usage">0%</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="ram-bar"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">TPS</span>
                    <span class="stat-value" id="tps">20.0</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="tps-bar"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section" id="console-section" style="display: none;">
            <h3>💬 Server Console</h3>
            <div id="console-output" class="console-output"></div>
            <div class="console-input-row">
                <input type="text" id="console-input" placeholder="Command..." />
                <button class="btn btn-primary btn-small" onclick="sendCommand()">Send</button>
            </div>
        </div>
        
        <div class="footer">
            <p>🔐 Secure connection | 🛡️ Owner: @Prostynskiy</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
